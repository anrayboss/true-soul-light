# 身心健康產業行銷與變現課程
## 一、課程引言
### 1-1 課程定位
- AWAKEN THE HEALING POWER
- 核心理念：用最真實能量連結靈魂
- 21年實戰沈澱，萃取療癒者變現架構
### 1-2 整理包價值
- 課程學費投資：300萬
- 社會大學實戰代價：1000萬+
- 目標：避開坑洞，直達結果
### 1-3 課程三大特色
- 整合流派優勢：理出最高效獲利地圖
- 零拍片變現法：免露臉建立強大信任
- 內部傳承秘籍：首度解密團隊變現法
### 1-4 個人化與科學化
- 找出專屬行銷模式
- 科學數據化提升效率
- 確保事業穩定自然成長
- WHY(願景)→HOW(信任)→WHAT(產品)
### 1-5 課程方案承諾
- 今日濃縮包：1HR/免費/10%架構
- 完整實戰班：30HR/＄3,000/達標退費＄0
- 高階陪跑班：100HR/＄30,000/含行銷顧問

## 四、行銷基礎觀念
### 4-1 行銷定義（AMA 2017）
- 創造、溝通、傳遞與交換價值
- 使顧客、夥伴與社會受益
### 4-2 業力法則
- 善因善果循環，先給予後獲得
### 4-3 各層次角色架構
- 大師→多界指導
- 指導老師→協助提升
- 靈性老師→靈性提升
- 領袖(道)→正確決策
- 領導者(法)→領導+謀略
- 經營者(術)→經營管理+系統
- 銷售者(器)→解決問題
- 消費者→找問題/抱怨者
### 4-4 名店產生要素
- 產品服務好（獨特性/解決問題/高CP值）
- 口碑推薦
- 排隊從眾效應
- 行銷目標：壓縮成功所需時間
### 4-5 高頻溝通力
- 核心技巧：認同→讚美→反問
- 框架：WHY→WHO→WHAT→HOW

## 五、精準定位方法
### 5-1 定位工具組合
- 大數據+個人觀感+他人觀感+儀器測量+老師建議
- 一般測驗：MBTI/人類圖/星座/DISC
- 儀器量測：個性/天賦/職業/靈魂使命
- 諮詢：此生功課/累世天賦
- 自傳+興趣+專長
- 人設九宮格→彙整導入AI
### 5-2 精準定位公式
- 綜合評估→意義→SWOT與PEST分析
### 5-3 「道」的層次分類框架
- 天道：純真/身份（阿彌陀佛/觀世音）
- 天功：大功大德/血脈（修行33重天）
- 地道：公義道理/規矩（王陽明/諸葛孔明）
- 地德：做出榜樣/雙方有所得（與神同行）
- 人道：本分/傳承（法律/錢/價值交換）
- 商道：誠信/信用/抓準趨勢（黃仁勳/AI）
- 妖道：成仙/吸靈氣（聊齋誌異）
- 魔道：成神/抓交替（路西法/聖經）

## 六、網路行銷三大要素
### 6-1 產品
#### 產品三力
- 產品力：產品本身賣點
- 品牌力：客戶認知的賣點
- 行銷力：透過包裝讓產品更好賣
#### 提升產品力
- 向內找：差異化賣點（品質/形狀）
- 向外找：時事梗（疫情/寵物/節日/AI）
- 水平找：認同感
#### 品牌力
- 接觸即成交，累積信任
- 小成交→大成交
- 重點：先賣出產品
#### 受眾設定
- 年齡/居住地/痛點/滿足方式
### 6-2 流量
#### 流量來源
- IG/FB/YouTube/店面/Threads
#### FB演算法關鍵
- 時間近→分數高→連結高
#### PO文禁忌（降觸及）
- 分享別人貼文
- 外部連結（LINE/YouTube等）
- 誘使留言
- 大量回覆私訊
- 大量分享與PO文
- 涉及違法內容
- 大量社團PO文被擋
#### 增加觸及率
- PO文分數高→下一篇提升
- 善用影片
- 前三行要有重點
#### 六大免費引流
- 客戶推薦文：客戶說的話大家聽
- 社團店家文：無限推文
- 客戶推薦標註個人版：背書效果強
- 個人版貼文：可自主掌握
- 粉絲頁留言增觸及：官方帳號感
- 限時動態：首頁曝光/3秒吸睛
### 6-3 系統
- 顧客體驗流程必須「簡單快速」

## 七、行銷策略分析框架
### 7-1 SWOT分析
- S優勢(Strengths)：內部有利
- W劣勢(Weaknesses)：內部不利
- O機會(Opportunities)：外部有利
- T威脅(Threats)：外部不利
### 7-2 PEST分析
- P政治(Political)：稅法/勞工法/政府政策
- E經濟(Economic)：利率/匯率/經濟成長/消費水平
- S社會(Social)：教育/人口/風俗/生活趨勢
- T科技(Technological)：技術趨勢/科技投資/產業發展
### 7-3 STP理論
- S Segmenting市場細分：分成不同群體
- T Targeting目標市場：選擇服務群體
- P Positioning市場定位：建立獨特位置
### 7-4 差異化策略
#### 七種差異化
- 形象差異化
- 人員差異化
- 通路差異化
- 產品差異化
- 服務差異化
- 價格差異化
- 收費模式差異化
#### 差異化核心原則
- 人無我有→市場創新第一
- 人有我優→品質超越競爭者
- 人優我廉→以價格取勝
#### 彼得杜拉克創新七來源
- 意外事件：掌握意外（西南航空/IKEA）
- 現象不一致：填平落差（貨櫃）
- 流程所需：解決問題（Apple音樂）
- 產業與市場改變：違背規則（Uber/Airbnb）
- 人口結構改變：對焦被忽略客群
- 觀念改變：不同角度（有機/健康主義）
- 新知識：獨特本領（IKEA AR實境）
### 7-5 4P行銷組合
- 產品Product：有形/無形，產品週期與獨特賣點
- 價格Price：感知價值非客觀成本
- 促銷Promotion：廣告/折扣/公關
- 地點Place：店面/網路/大賣場
### 7-6 4C顧客導向
- Customer顧客：先了解需求提供價值
- Cost成本：生產+顧客取得成本
- Convenience便利性：購買方便
- Communication溝通：雙向非單向促銷
### 7-7 AISAS傳播模型
- A注意(Attention)：抓眼球標題/促銷活動
- I興趣(Interest)：改善利益/功效承諾
- S搜尋(Search)：主動搜尋產品資訊
- A行動(Action)：購買或試用
- S分享(Share)：口碑擴散

## 八、平台願景與商業規劃

- 人：代理商

- 諮詢/課程：獨特技術/老師培訓（可複製）
- 產品：建議顧客所需/產品培訓/獨特產品
### 8-5 循環流程
- 量測→分類→預約老師→課程/宣傳→量測→課程/產品
- 產品線：儀器/課程/諮詢/健康食品/美容/保養/能量/代餐/日用
### 8-6 公司獨特競爭優勢
- 公司：整合諮詢/課程/產品平台
- 產品：量子能量結合/專利產品
- 制度：解決直銷問題/不受標籤影響
- 系統：免費引流/完整系統/老師+業務培訓
- 行銷模式：多通路/分享APP即有收入
- 品牌：最多老師推薦
- 團隊：專業團隊
- 技術：靈性技術免費教

- 無法快速取得信任
- 無法複製（靠個人魅力）
- 心靈太過無形
- 顧客感覺不到差別
- 引流困難
### 8-8 儀器選擇9大標準
- 高性價比/減少經營壓力
- 專業人士認同（如醫師）
- 第一或唯一性
- 效果快速（30分鐘內）
- 肉眼可見效果
- 要有認證
- 推出時間要長
- 老公司/新市場
- 有流量與名單來源
### 8-9 人才需求
- 身心靈老師或想學習的人
- 特助（細心）
- 財稅專業（會計師）
- 醫療專業（醫師/護理師/營養師/藥師/心理師）
- 行銷專業（小編/拍攝/剪片/經紀人）
- 法律專業
### 8-10 組織架構
- CEO
  - 培訓總監：業務培訓/產品培訓
  - 行銷總監：網路/自媒體/官網媒體店
  - 業務

- 1.靈性老師/個人顧問(2024.7)

        <section id="map-container" class="w-1/2 relative bg-slate-900 flex flex-col h-full transition-all duration-300 overflow-hidden">
            <svg id="markmap" class="w-full flex-1 cursor-move" style="height: 100%; width: 100%; min-height: 500px;"></svg>
            <div class="absolute bottom-6 right-6 flex space-x-2 bg-slate-800/90 border border-slate-700 p-1.5 rounded-xl shadow-xl backdrop-blur-md z-10">
                <button onclick="zoomIn()" title="放大" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition shadow"><i class="fa-solid fa-plus text-sm"></i></button>
                <button onclick="zoomOut()" title="縮小" class="w-9 h-9 flex items-center justify-center rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition shadow"><i class="fa-solid fa-minus text-sm"></i></button>
                <button onclick="zoomFit()" title="適合螢幕" class="w-9 h-9 flex items-center justify-center rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition shadow"><i class="fa-solid fa-expand text-sm"></i></button>
            </div>

    <script>
        var transformer, mm;

        // Simple markdown to tree parser (fallback if Transformer unavailable)
        function parseMarkdown(md) {
            const lines = md.split('\n');
            const root = { content: '', children: [], depth: 0 };
            const stack = [root];

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                let depth, content;
                const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)/);
                const bulletMatch = trimmed.match(/^[-*]\s+(.*)/);
                const indentedBulletMatch = line.match(/^(\s+)[-*]\s+(.*)/);

                if (headingMatch) {
                    depth = headingMatch[1].length;
                    content = headingMatch[2];
                } else if (indentedBulletMatch) {
                    const indent = indentedBulletMatch[1].length;
                    depth = 7 + Math.floor(indent / 2);
                    content = indentedBulletMatch[2];
                } else if (bulletMatch) {
                    depth = 7;
                    content = bulletMatch[1];
                } else {
                    continue;
                }

                const node = { content, children: [], depth };

                while (stack.length > 1 && stack[stack.length - 1].depth >= depth) {
                    stack.pop();
                }
                stack[stack.length - 1].children.push(node);
                stack.push(node);
            }

            return root.children.length === 1 ? root.children[0] : root;
        }

        function buildMarkmapData(node) {
            return {
                content: node.content,
                children: (node.children || []).map(buildMarkmapData)
            };
        }

        function initMarkmap() {
            const { Markmap } = window.markmap;
            const svgEl = document.querySelector('#markmap');

            mm = Markmap.create(svgEl, {
                zoom: true,
                pan: true,
                initialExpandLevel: 2,
                color: (node) => {
                    const colors = ['#6366f1', '#a855f7', '#14b8a6', '#f59e0b', '#ec4899', '#3b82f6', '#ef4444', '#84cc16', '#06b6d4'];
                    return colors[node.depth % colors.length];
                },
                style: (id) => `
                    .${id} g { fill: #f1f5f9; font-weight: 500; font-family: ui-sans-serif, system-ui, sans-serif; }
                    .${id} line { stroke: #64748b !important; }
                    .${id} circle { stroke: #6366f1; fill: #1e293b; }
                `
            });

            // Try to get Transformer from markmap-lib
            if (window.markmap && window.markmap.Transformer) {
                transformer = new window.markmap.Transformer();
                console.log('Using markmap Transformer');
            } else {
                console.log('Transformer not available, using built-in parser');
            }

            setTimeout(() => { updateMarkmap(); }, 100);
        }

        function updateMarkmap() {
            if (!mm) return;
            const markdown = document.querySelector('#editor').value;

            let root;
            if (transformer) {
                const result = transformer.transform(markdown);
                root = result.root;
            } else {
                root = buildMarkmapData(parseMarkdown(markdown));
            }

            mm.setData(root);
            mm.fit();
        }

        let timeout;
        document.querySelector('#editor').addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updateMarkmap, 300);
        });

        function switchView(mode) {
            const editorCol = document.querySelector('#editor-container');
            const mapCol = document.querySelector('#map-container');
            const btns = {
                split: document.querySelector('#btn-view-split'),
                edit: document.querySelector('#btn-view-edit'),
                map: document.querySelector('#btn-view-map')
            };
            Object.values(btns).forEach(btn => {
                btn.className = "px-3 py-1.5 rounded-md text-xs font-medium transition-all text-slate-400 hover:text-white flex items-center space-x-1";
            });
            if (mode === 'split') {
                btns.split.className = "px-3 py-1.5 rounded-md text-xs font-medium transition-all bg-indigo-600 text-white shadow-sm flex items-center space-x-1";
                editorCol.style.display = "flex";
                editorCol.style.width = "50%";
                mapCol.style.display = "flex";
                mapCol.style.width = "50%";
            } else if (mode === 'edit') {
                btns.edit.className = "px-3 py-1.5 rounded-md text-xs font-medium transition-all bg-indigo-600 text-white shadow-sm flex items-center space-x-1";
                editorCol.style.display = "flex";
                editorCol.style.width = "100%";
                mapCol.style.display = "none";
            } else if (mode === 'map') {
                btns.map.className = "px-3 py-1.5 rounded-md text-xs font-medium transition-all bg-indigo-600 text-white shadow-sm flex items-center space-x-1";
                editorCol.style.display = "none";
                mapCol.style.display = "flex";
                mapCol.style.width = "100%";
            }
            setTimeout(() => { if (mm && mode !== 'edit') { mm.fit(); } }, 300);
        }

        window.addEventListener('resize', () => {
            if (mm && document.querySelector('#map-container').style.display !== 'none') { mm.fit(); }
        });

        function zoomIn() { mm.rescale(1.25); }
        function zoomOut() { mm.rescale(0.8); }
        function zoomFit() { mm.fit(); }

        function exportMarkdown() {
            const text = document.querySelector('#editor').value;
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '陳仲豪行銷課程大綱.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportSVG() {
            const svgEl = document.querySelector('#markmap');
            const clone = svgEl.cloneNode(true);
            const g = svgEl.querySelector('g');
            const bbox = g.getBBox();
            clone.setAttribute('viewBox', `${bbox.x - 50} ${bbox.y - 50} ${bbox.width + 100} ${bbox.height + 100}`);
            clone.setAttribute('width', bbox.width + 100);
            clone.setAttribute('height', bbox.height + 100);
            clone.style.backgroundColor = '#0f172a';
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(clone);
            if(!source.match(/^<\?xml/)){
                source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
            }
            const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '陳仲豪行銷課程大綱_心智圖.svg';
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = initMarkmap;
    </script>
