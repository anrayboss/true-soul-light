## 一、 自媒體經營心態與平台趨勢 (1/2)
* **個人品牌實戰經驗**
  * 講師（世豐）分享：經營 Threads（脆）約半年，粉絲數從 300 成長至 1.4 萬。
  * Threads 目前具備極大的流量紅利，類似早期「短影音平台」剛崛起的商機。
* **自媒體經營的四大核心心態**

---

## 一、 自媒體經營心態與平台趨勢 (2/2)
1. **觀察力**：學會觀察熱門文章的爆紅軌跡，理解其運作邏輯。
  2. **利他**：分享有價值的內容，主動協助與回饋他人（如幫忙轉貼好文章、用心回覆留言）。
  3. **真實**：展現最真實的自我，敢於分享生命中深刻的挫折與真實感悟。
  4. **輕鬆心態**：不要把經營當成沈重的日更功課，以「交朋友」的放鬆心態出發。

---

* **講人話的原則**
  * 使用白話文與容易聽懂的語言，避免使用艱深的專業名詞。
* **爆紅開場白的三大技巧**
  1. **情緒張力（第一句話決定勝負）**

## 二、 Threads 底層邏輯與開場白技巧 (2/4)
* **負面張力**：利用「貪、嗔、癡、慢、疑」等痛點引發強烈共鳴（如：「為什麼你到現在存不到錢」）。*註：吸引注意後必須回歸正面價值輸出，避免淪為引戰帳號。*

## 四、 進階社群操作技巧：軍師的 17 個實戰策略（大補帖） (1/5)
1. **連環串**：複製自己舊文的連結，附在最新貼文的下方，引導讀者進行點閱與連續閱讀。
2. **煽風點火**：撰寫極具討論度與爭議性的話題，並表達強烈觀點（例如：「不相信身心靈的人，只是迷信科學的狂熱份子」），引爆留言區討論。
3. **下集待續**：將核心內容或結局埋在留言區，主文末端附上箭頭指引，藉此延長讀者在貼文上的停留時間，優化互動率。
4. **草船借箭**：將自己寫得好的 5-10 篇好文風格丟給 AI 訓練，再將書籍乾貨一字不漏丟入，請 AI 依此風格改寫，產出具個人色彩的知識文。

---

## 四、 進階社群操作技巧：軍師的 17 個實戰策略（大補帖） (2/5)
5. **頤指氣使**：在爆紅貼文的置頂留言中，明確指引讀者「如果喜歡請追蹤我」，並承諾追蹤後能獲得的價值。
6. **無限彈藥**：由於 Threads 資訊流動極快，爆紅過的好文章可在 2-3 個月後重複發布，形成循環使用的內容彈藥庫。
7. **重心拱月**：在幫自己或他人進行推廣時，將該推廣貼文的連結，大量引用在其他不同話題的留言區中，把流量集中灌入該篇核心文。
8. **一竿進洞**：當貼文爆紅時，立刻在置頂留言中附上「私域導入連結」（如電子報、LINE社群）或「產品購買連結」。

---

## 四、 進階社群操作技巧：軍師的 17 個實戰策略（大補帖） (3/5)
9. **銜尾蛇**：將 A、B 兩篇高度相關的文章，以互相在留言區貼上對方連結的方式，讓讀者在兩篇貼文間無限循環閱讀。
10. **雞犬升天**：某篇貼文爆紅時，立刻在留言區貼上其他相同主題的舊文連結，拉抬其他文章的曝光度。
11. **移花接木**：初期發文時先不放銷售連結，等貼文自然擴散、流量滾大後，再把原置頂留言替換成產品銷售或廣告連結。
12. **順勢而為**：當某種類型的貼文爆紅，立刻配合該主題微調自己的自我介紹（字界），最大化進站讀者的追蹤轉換率。

## 四、 進階社群操作技巧：軍師的 17 個實戰策略（大補帖） (4/5)
13. **後備軍援**：平常將自己成效優異的爆紅貼文連結整理並儲存，作為隨時可插入新貼文留言區的軍備彈藥。
14. **預埋伏筆**：寫文時習慣性加上「下集待續/晚上再寫」的伏筆，若文章爆紅就順勢推出續集引流，不爆則不予理會。
15. **引蛇出動**：在貼文中主動推薦並 Tag 其他厲害的 KOLS，吸引對方來留言區互動，借用對方的流量與人氣。
16. **亂棒打死老師傅**：帶有銷售或業配意圖的貼文觸及一定較低。此時不用管單篇觸及，改以「日更、狂發數十篇」的數量優勢來達成轉換。

## 五、 核心變現思維：公寓轉私域 (1/3)
* **公域與私域的定義**
  - **公域（公開領域）**：如 Threads、Facebook、IG。特色是注意力分散、演算法隨時在變，不適合直接做深度的專業成交。核心目的是**獲取流量與受眾**。
  - **私域（私人領域）**：如電子報（如 Substack）、LINE 官方帳號/社群。特色是訊息遞送穩定，能持續跟讀者溝通，適合建立信任與深度價值交換。
* **公寓轉私域的變現路徑**

## 五、 核心變現思維：公寓轉私域 (2/3)
- **步驟**：在公域發布優質文章 -&gt; 爆紅時使用「一竿進洞」策略 -&gt; 導入私域（電子報/LINE） -&gt; 在私域專注輸出核心價值，建立強烈信任感 -&gt; 最終水到渠成完成產品變現。
* **變現產品與載體**
  - **Medium Partner Program**：透過撰寫長文獲取平台分潤。
  - **數位產品**：電子書、付費軟體、線上課程。台灣推薦使用**傳送門（Portaly）**快速建置產品並串接金流。

## 五、 核心變現思維：公寓轉私域 (3/3)
- **組織行銷（直銷）**：將社群流量轉化為組織事業的增長。
  - **實體服務/顧問**：塔羅占星、一對一諮詢等。粉絲不多時，建議提供無壓力、低定價的入門款服務，以便快速實驗並修正產品結構。
* **主動開發策略（非流量變現法）**
  - 不追求高流量。在個人版面上塞滿極具專業度的硬核乾貨文（地軍），接著主動私訊開發潛在的合適品牌或客戶。當對方點進版面看見你的專業度後，即可直接促成成交。*（此方式較累，通常不作首要推薦）*

  * **Who Cares?** 讀者並不會記得你單篇貼文的瑕疵，大家看的是整體的「品牌印象」與「感覺」。

  * **海軍（Navy）**：分享真實生命故事、職涯轉折、深刻的反思與自身的「脆弱面」，以建立強烈的信任感，這是最終導向產品或服務成交的關鍵。

## 四、 嘉賓分享 1：宇宙先生（AI 與職涯顧問、100杯陌生咖啡計畫發起人） (1/5)
* **Threads 經營心態與基本法**
  * 不要太認真，隨心所欲地發想與嘗試，先求有流量、在讀者面前刷存在感最重要。
  * 遇到好文章直接截圖，並維持每周整理一次截圖的紀律。
* **魔法閱讀法**

## 四、 嘉賓分享 1：宇宙先生（AI 與職涯顧問、100杯陌生咖啡計畫發起人） (2/5)
* 沒靈感時像抽籤一樣隨機翻書，將書中的金句或要點用「自己的話重新詮釋」發在 Threads 上。
  * **防抄襲技巧**：挑選至少「三個月前」看過的文章或金句進行改寫，並確保內容與個人的人設相容。
* **以終為始的流量變現路徑**
  * **六加一法則**：每周前 6 天發布與特定主題相關的系列短文（累積 Threads 流量），第 7 天將其整理成一篇長文發送至「電子報」。

## 四、 嘉賓分享 1：宇宙先生（AI 與職涯顧問、100杯陌生咖啡計畫發起人） (3/5)
* **名單為王**：將社群的零散流量引流並沉澱為「電子報訂閱名單」，這才是後續舉辦活動、線上課程與工作坊等商業變現的核心資產。
* **陪跑團運營心法**
  * 陪跑團承諾通常為 3 個月到 1 年。
  * 絕對不能只靠自己經營，必須建立小幫手/助理代班機制，確保自己度假時社群仍具備良好互動，否則容易因互動冷落而產生負評。

## 四、 嘉賓分享 1：宇宙先生（AI 與職涯顧問、100杯陌生咖啡計畫發起人） (4/5)
* **100 杯陌生咖啡計畫**
  * 將約陌生人喝咖啡當作「創業」來經營，撰寫十點明確的見面宣言。
  * 善用「數位遊牧」與「咖啡館創業」等熱門關鍵字，在 Threads 上迅速引爆話題（45 天內約成 26 杯）。
* **AI 故事寫作的指令秘訣**

## 四、 嘉賓分享 1：宇宙先生（AI 與職涯顧問、100杯陌生咖啡計畫發起人） (5/5)
* 不要直接叫 AI 寫故事（產出的內容生硬且沒有流量）。
  * **核心做法**：先自己擬定完整的故事架構、角色設定，並在 Prompts 中加入大量「電影編劇」相關的風格指令，或上傳 PDF 檔供 AI 學習自己的文字調性與筆觸。

  * 不盲目跟從每日發 6 到 10 篇的硬性社群策略，秉持「想寫就寫」的隨性風格，每個月也能產出 1-2 篇爆紅文章。
* **職場痛點的深刻共鳴**
  * 分享科技業 15 年職場雖然年薪百萬，但每天「極度不爽、不想起床、出差身心俱疲」的真實痛苦，勾起廣大都會上班族對「離職、躺平」的強烈共鳴。

  * 結合人類圖（現世生產者分析）、脈輪、靈氣等工具，在生活中維持高度覺察。

## 二、 Excel 講師（Henry Yang 亨利洋）的 Threads 經營心法 (1/2)

  1. **真實的力量（真）**：效果最好的爆紅文章往往最真實（例如日常 Excel 的真實感觸），而非字句最優美或最用梗的文章。做自己，真實就有力量。

2. **專業降維（有用）**：專業是用來跟同行交流的。面對 Threads 大眾，應使用通俗言語分享最簡單實用的函數（如讓讀者覺得「好簡單，原來我也做得到」），藉此拉近距離。

# 脆第三堂課程：起號攻略與實戰心法 — 課程大綱

---

## 一、 Threads 起號的重要概念與前置認知 (1/2)
* **為什麼需要起號？**
  * 許多學員的 Threads 帳號原本處於停滯、放廢狀態，或是直接由 IG 自動連動發文。
  * **避開聯動陷阱**：Threads 演算法並不鼓勵且會降低 IG 直接連動貼文的觸及率。即使內容相同，手動直接在 Threads 發文的效果也遠勝於自動聯動。
  * 起號策略不僅適用於剛開張的新帳號，更適用於經營已久但毫無流量、無追蹤、無法變現的「僵屍帳號」。

---

## 一、 Threads 起號的重要概念與前置認知 (2/2)
* **APP 代操成功案例**
  * 講師代操某款軟體 APP 的官方帳號（無真人頭像，採用精緻設計的 Logo Icon）。
  * 在初始粉絲不足 100 人的情況下，操作兩週粉絲即逼近 1000 人。
  * 由於引流效果過於強大，軟體團隊甚至需要調控伺服器（Server）以防系統因瞬間下載量過大而爆表。

---

## 二、 起號三階段實戰架構 (1/8)
### 階段 1：測試階段（Test Phase） — 尋找引力點
* **準備素材**
  * 強制要求自己規劃並準備 30 天的文章主題，並依**空軍（泛流量話題）**、**地軍（乾貨列點）**、**海軍（個人故事）**進行分類。
* **設定單一目標**
  * 不要同時追蹤多個指標。新帳號應先聚焦於「總瀏覽量」或「新增追蹤數」；有基礎的帳號則聚焦於「私域轉化率」或「訂單數」。

---

## 二、 起號三階段實戰架構 (2/8)
* **模仿對標，拒絕「假會」**
  * 沒經驗的初學者應直接尋找同領域 5 個優秀對標帳號進行模仿，**完全照搬其成功的格式與排版**去填入自己的內容，切忌自行隨意修改成功模板。
* **鎖定成功模式，重複執行**
  * 廣告界傳奇葉明貴指出：「找到一個成功模式有效，就一直試，試到沒效為止。」

---

## 二、 起號三階段實戰架構 (3/8)
* 案例：利用 APP 平台的媒合特性，在 Threads 上發起特定地區的「店家互惠互追接龍（互追文）」，給予店家明確的曝光互惠理由，在台南、高雄等地區皆引爆極高互動。

### 階段 2：發酵階段（Fermentation Phase） — 蓄水與人設打造
* **打造雙軌制**
  * 在維持原有成功模式（主線）的同時，開始探索並測試第二種成功的模式（副線），確保流量穩定增長。
* **善用平台新功能（演算法紅利）**

---

## 二、 起號三階段實戰架構 (4/8)
* **螢光筆（Highlighting）功能**：新功能推出時，演算法通常會給予流量獎勵。將已爆紅的貼文在兩三天後用螢光筆重新 highlight 轉發，可額外賺取數萬瀏覽量。
  * **Hash Tags**：Threads 標籤在手機端極為顯眼，應明確打上精準標籤（如：*#找創作者*、*#互追曝光*），直接鎖定受眾意圖。
* **塑造真實人設**
  * 避免只發千篇一律、缺乏辨識度的「雞湯文」。人設的建立來自於對事件提出**明確、獨特且與眾不同的觀點**，並穿插個人真實的生活經歷，讓人設活起來。

---

## 二、 起號三階段實戰架構 (5/8)
* **養魚先養水：重視冷粉互動**
  * 在起步階段，對任何留言都要真情流露地積極回覆（例如主動發問「有照片嗎？」引導對方二度留言）。把粉絲當真人看，才能培養出高黏著度的鐵粉。
* **主動留言「截流」策略（以學員夢哥為例）**
  * 針對當前社會高度關注的熱門時事（如虐童案、知名 KOL 爭議）進行高頻率、認真且有溫度的留言。

---

## 二、 起號三階段實戰架構 (6/8)
* **黃金時間觀察法**：選擇發布 1-2 小時內、已有 10 個以上留言但瀏覽量未破萬的潛力文章進行留言，卡位熱門區以收割高曝光。
  * **備用彈藥庫**：事先準備好長篇的通用知識（如推薦書單），當看見有人發問求推薦時，第一時間貼上並微調，快速轉化讀者為自身追蹤。

### 階段 3：引爆階段（Ignition Phase） — 信任收割與變現
* **一擊必殺（一擊斃命）**
  * 經過前面測試與發酵的鋪陳後，放出個人的重大生命轉折或奇葩經歷（海軍壓箱寶故事），瞬間引爆流量。

---

## 二、 起號三階段實戰架構 (7/8)
* *案例 1*：學員 Ana（前護理師）以課程模板格式撰寫在護理界的委屈與感悟，單篇創造 100 萬瀏覽量。
    * *案例 2*：學員 Busy（前遊戲業營運長）在累積專業人設後，發文分享 24 歲當上營運長、手握 1.5 億廣告預算等壓箱寶故事，取得極大成功並成功轉單。
* **開門見山**
  * 當流量與信任鋪陳足夠，即可在本文或置頂留言中直接亮出產品購買或私域連結。

## 二、 起號三階段實戰架構 (8/8)
* **澄清迷信**：放連結不會被降觸及，會被降觸及是因為「文章寫得太爛、業配感太重、像廣告傳單」。只要情境相符、內容有價值，直球附上連結反而能極大化轉換率。
* **以量取勝**
  * 若產品比較生硬（如直銷、減肥產品）難以寫出爆紅文，則採用「一天多發、以量取勝」的策略。單篇只有 3000 瀏覽沒關係，發 10 篇也能累積 3 萬曝光。

## 三、 答疑交流與變現探討 (1/3)
* **自己抄襲自己（舊文重複發布）的價值**
  * Threads 的資訊流轉極快，同一個爆紅貼文，隔一兩個月完全一字不改重複發布，成效通常比第一次還好（因為累積了大量未看過此文的新粉絲）。
  * 經營 Threads 越久會越輕鬆，因為你手頭擁有的爆紅舊文，都是可以隨時重發的免費高效彈藥庫。

## 三、 答疑交流與變現探討 (2/3)
* **學員痛點**：本業做命理諮詢，未來想推出「開運彩妝」變現，擔心突然端出彩妝會顯得太商業，進而影響命理人設。
  - **建議 1（不分帳號經營）**：個人創作者時間精力寶貴，不建議開第二個帳號（會極大消耗大腦記憶體與時間）。
  - **建議 2（客群高度重疊）**：命理與開運彩妝的受眾重疊度極高，可嘗試合併經營一兩個月觀察成效。
  - **建議 3（漏斗式引流）**：在公域（Threads）維持純粹的命理人設進行諮詢，當個案成交並加入私域（LINE 官方帳號）後，再於私域向其推廣開運彩妝，既能維持公域形象，又能有效變現。

    <script>
        let slides = [];
        let currentSlideIdx = 0;
        let isPlaying = false;
        let playTimer = null;
        let playIntervalSec = 6;
        let autoplayProgressTimer = null;
        let autoplayProgressPercent = 0;
        let laserEnabled = false;

        // Custom parser to split Markdown into slide objects with line number tracking
        function parseSlidesFromMarkdown(md) {
            const lines = md.split('\n');
            const list = [];
            let currentSlideLines = [];
            let startLineIdx = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.trim() === '---') {
                    list.push({
                        rawLines: [...currentSlideLines],
                        startLineIdx: startLineIdx,
                        lineCount: currentSlideLines.length,
                        notes: '',
                        isCover: false
                    });
                    currentSlideLines = [];
                    startLineIdx = i + 1;
                } else {
                    currentSlideLines.push(line);
                }
            }

            // Push the last slide
            list.push({
                rawLines: [...currentSlideLines],
                startLineIdx: startLineIdx,
                lineCount: currentSlideLines.length,
                notes: '',
                isCover: false
            });

            // Post-process slides (extract notes and determine covers)
            list.forEach(slide => {
                let note = '';
                let displayLines = [];
                let inNoteBlock = false;

                // Pre-compile Regexes with concatenated strings to prevent editor HTML parsing/highlighting bugs
                const noteRegexHTML = new RegExp('<' + '!--\\s*Note:\\s*([\\s\\S]*?)\\s*-' + '->', 'i');
                const noteRegexStart = new RegExp('<' + '!--\\s*Note:', 'i');
                const notePrefixReplace = new RegExp('<' + '!--\\s*Note:\\s*', 'i');
                const noteSuffixReplace = new RegExp('\\s*-' + '->$', 'i');
                const noteEndMarker = '-' + '->';

                for (let i = 0; i < slide.rawLines.length; i++) {
                    const line = slide.rawLines[i];
                    const trimmed = line.trim();

                    // Detect Note
                    const matchHTML = trimmed.match(noteRegexHTML);
                    const matchStart = trimmed.match(noteRegexStart);

                    if (matchHTML) {
                        note += trimmed.replace(notePrefixReplace, '').replace(noteSuffixReplace, '') + '\n';
                    } else if (matchStart) {
                        inNoteBlock = true;
                        note += trimmed.replace(notePrefixReplace, '') + '\n';
                    } else if (inNoteBlock) {
                        if (trimmed.includes(noteEndMarker)) {
                            inNoteBlock = false;
                            note += trimmed.replace(noteSuffixReplace, '') + '\n';
                        } else {
                            note += line + '\n';
                        }
                    } else if (trimmed.match(/^Note:\s*(.*)/i)) {
                        note += trimmed.replace(/^Note:\s*/i, '') + '\n';
                    } else {
                        // Display line
                        displayLines.push({
                            text: line,
                            relativeIdx: i
                        });
                    }
                }

                slide.notes = note.trim();
                slide.displayLines = displayLines;
                slide.displayContent = displayLines.map(dl => dl.text).join('\n');

                // Check cover slide
                const firstDisplayLine = displayLines.length > 0 ? displayLines[0].text.trim() : '';
                slide.isCover = firstDisplayLine.startsWith('# ');
            });

            return list;
        }

        // Initialize marked options
        marked.use({
            gfm: true,
            breaks: true
        });

        // Map slide DOM elements back to Markdown line indices for direct editing
        let activeEditingEl = null;

        function findLineIdxByDOMElement(domEl, slideIdx) {
            const slide = slides[slideIdx];
            const targetText = domEl.innerText.trim();
            if (!targetText) return -1;

            const cleanText = (str) => {
                // Remove Markdown special chars, formatting tags, math characters, punctuation, and all whitespace
                return str.replace(/[#\-\*\_\`\$\+\\\{\}\[\]\(\)\d\.\s\:\：\，\、\。]/g, '');
            };

            const targetClean = cleanText(targetText);
            if (!targetClean) return -1;

            const lines = document.getElementById('editor').value.split('\n');
            let bestMatchIdx = -1;
            let bestMatchScore = 0;

            for (let i = 0; i < slide.lineCount; i++) {
                const absoluteIdx = slide.startLineIdx + i;
                const lineText = lines[absoluteIdx];
                if (!lineText) continue;

                // Skip note lines
                if (lineText.trim().startsWith('<!--') || lineText.trim().startsWith('Note:')) {
                    continue;
                }

                const lineClean = cleanText(lineText);
                if (lineClean === targetClean) {
                    return absoluteIdx; // Perfect match
                }

                // Fallback to substring match if cleanText changes slightly
                if (lineClean.includes(targetClean) || targetClean.includes(lineClean)) {
                    const score = Math.min(lineClean.length, targetClean.length);
                    if (score > bestMatchScore) {
                        bestMatchScore = score;
                        bestMatchIdx = absoluteIdx;
                    }
                }
            }

            return bestMatchIdx;
        }

        function attachEditEventsToSlide(slideIdx) {
            const slideEl = document.getElementById(`slide-${slideIdx}`);
            if (!slideEl) return;

            // Select all editable elements in document order
            const editableDOMs = slideEl.querySelectorAll('.slide-body h1, .slide-body h2, .slide-body h3, .slide-body p, .slide-body li');

            editableDOMs.forEach(domEl => {
                domEl.classList.add('hover:bg-slate-700/20', 'rounded', 'px-1.5', 'transition-colors', 'cursor-pointer');
                domEl.title = "雙擊直接編輯此段文字";

                domEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    e.preventDefault();

                    const lineIdx = findLineIdxByDOMElement(domEl, slideIdx);
                    if (lineIdx >= 0) {
                        startDirectEdit(domEl, lineIdx);
                    } else {
                        console.warn('Could not find corresponding markdown line for element:', domEl.innerText);
                    }
                });
            });
        }

        function startDirectEdit(domEl, absoluteLineIdx) {
            // Commit any active edit first
            if (activeEditingEl && activeEditingEl !== domEl) {
                commitDirectEdit(activeEditingEl, parseInt(activeEditingEl.dataset.absoluteLineIdx));
            }

            // Pause autoplay if it is running
            if (isPlaying) {
                togglePlay();
            }

            const editor = document.getElementById('editor');
            const lines = editor.value.split('\n');
            const originalLine = lines[absoluteLineIdx];

            // Save state on DOM element
            domEl.dataset.originalHtml = domEl.innerHTML;
            domEl.contentEditable = 'true';
            domEl.textContent = originalLine; // Display the EXACT full markdown line content (including prefixes like #, -, etc.)

            // Add editing styles
            domEl.classList.add('bg-slate-800/90', 'text-indigo-200', 'ring-2', 'ring-indigo-500', 'outline-none', 'p-1.5', 'rounded-lg', 'shadow-lg');
            domEl.focus();

            // Select all text
            const range = document.createRange();
            range.selectNodeContents(domEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            activeEditingEl = domEl;

            // Key listeners
            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    if (!e.shiftKey) {
                        e.preventDefault();
                        domEl.removeEventListener('keydown', handleKeyDown);
                        commitDirectEdit(domEl, absoluteLineIdx);
                    }
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    domEl.removeEventListener('keydown', handleKeyDown);
                    cancelDirectEdit(domEl);
                }
            };
            domEl.addEventListener('keydown', handleKeyDown);

            // Blur listener
            const handleBlur = () => {
                domEl.removeEventListener('blur', handleBlur);
                setTimeout(() => {
                    if (activeEditingEl === domEl) {
                        commitDirectEdit(domEl, absoluteLineIdx);
                    }
                }, 150);
            };
            domEl.addEventListener('blur', handleBlur);
        }

        function commitDirectEdit(domEl, absoluteLineIdx) {
            if (domEl.contentEditable !== 'true') return;

            const newText = domEl.textContent.trim();

            const editor = document.getElementById('editor');
            const lines = editor.value.split('\n');
            lines[absoluteLineIdx] = newText;
            editor.value = lines.join('\n');

            // Reset element state
            domEl.contentEditable = 'false';
            domEl.classList.remove('bg-slate-800/90', 'text-indigo-200', 'ring-2', 'ring-indigo-500', 'outline-none', 'p-1.5', 'rounded-lg', 'shadow-lg');

            if (activeEditingEl === domEl) {
                activeEditingEl = null;
            }

            // Re-render slides and rebuild editor line index mapping
            renderSlides();
        }

        function cancelDirectEdit(domEl) {
            domEl.contentEditable = 'false';
            domEl.innerHTML = domEl.dataset.originalHtml;
            domEl.classList.remove('bg-slate-800/90', 'text-indigo-200', 'ring-2', 'ring-indigo-500', 'outline-none', 'p-1.5', 'rounded-lg', 'shadow-lg');

            if (activeEditingEl === domEl) {
                activeEditingEl = null;
            }
        }

        let activeOutlineEditingEl = null;

        function startOutlineNoteEdit(noteEl) {
            if (activeOutlineEditingEl && activeOutlineEditingEl !== noteEl) {
                commitOutlineNoteEdit(activeOutlineEditingEl);
            }

            if (isPlaying) {
                togglePlay();
            }

            const slideIdx = parseInt(noteEl.dataset.slideIdx);
            const slide = slides[slideIdx];
            const originalNotes = slide.notes || '';

            noteEl.dataset.originalNotes = originalNotes;
            noteEl.contentEditable = 'true';
            noteEl.textContent = originalNotes;

            noteEl.classList.add('bg-slate-900', 'text-amber-200', 'ring-2', 'ring-amber-500/80', 'outline-none', 'p-3', 'rounded-xl', 'shadow-lg');
            noteEl.focus();

            // Select all text
            const range = document.createRange();
            range.selectNodeContents(noteEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            activeOutlineEditingEl = noteEl;

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    if (!e.shiftKey) {
                        e.preventDefault();
                        noteEl.removeEventListener('keydown', handleKeyDown);
                        commitOutlineNoteEdit(noteEl);
                    }
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    noteEl.removeEventListener('keydown', handleKeyDown);
                    cancelOutlineNoteEdit(noteEl);
                }
            };
            noteEl.addEventListener('keydown', handleKeyDown);

            const handleBlur = () => {
                noteEl.removeEventListener('blur', handleBlur);
                setTimeout(() => {
                    if (activeOutlineEditingEl === noteEl) {
                        commitOutlineNoteEdit(noteEl);
                    }
                }, 150);
            };
            noteEl.addEventListener('blur', handleBlur);
        }

        function commitOutlineNoteEdit(noteEl) {
            if (noteEl.contentEditable !== 'true') return;

            const slideIdx = parseInt(noteEl.dataset.slideIdx);
            const newNotes = noteEl.innerText.trim();

            noteEl.contentEditable = 'false';
            noteEl.classList.remove('bg-slate-900', 'text-amber-200', 'ring-2', 'ring-amber-500/80', 'outline-none', 'p-3', 'rounded-xl', 'shadow-lg');

            if (activeOutlineEditingEl === noteEl) {
                activeOutlineEditingEl = null;
            }

            updateSlideNotes(slideIdx, newNotes);
        }

        function cancelOutlineNoteEdit(noteEl) {
            noteEl.contentEditable = 'false';
            noteEl.classList.remove('bg-slate-900', 'text-amber-200', 'ring-2', 'ring-amber-500/80', 'outline-none', 'p-3', 'rounded-xl', 'shadow-lg');

            const originalNotes = noteEl.dataset.originalNotes;
            if (originalNotes) {
                noteEl.textContent = originalNotes;
            } else {
                noteEl.innerHTML = '<span class="text-slate-500 italic">無備忘紀錄，雙擊此處新增...</span>';
            }

            if (activeOutlineEditingEl === noteEl) {
                activeOutlineEditingEl = null;
            }
        }

        function updateSlideNotes(slideIdx, newNotes) {
            const editor = document.getElementById('editor');
            const lines = editor.value.split('\n');
            const slide = slides[slideIdx];

            const slideLines = lines.slice(slide.startLineIdx, slide.startLineIdx + slide.lineCount);

            const noteRegexHTML = new RegExp('<' + '!--\\s*Note:\\s*([\\s\\S]*?)\\s*-' + '->', 'i');
            const noteRegexStart = new RegExp('<' + '!--\\s*Note:', 'i');
            const noteEndMarker = '-' + '->';

            let inNoteBlock = false;
            const filteredLines = [];

            for (let i = 0; i < slideLines.length; i++) {
                const line = slideLines[i];
                const trimmed = line.trim();

                const matchHTML = trimmed.match(noteRegexHTML);
                const matchStart = trimmed.match(noteRegexStart);

                if (matchHTML) {
                    continue;
                } else if (matchStart) {
                    inNoteBlock = true;
                    continue;
                } else if (inNoteBlock) {
                    if (trimmed.includes(noteEndMarker)) {
                        inNoteBlock = false;
                    }
                    continue;
                } else if (trimmed.match(/^Note:\s*(.*)/i)) {
                    continue;
                } else {
                    filteredLines.push(line);
                }
            }

            while (filteredLines.length > 0 && filteredLines[filteredLines.length - 1].trim() === '') {
                filteredLines.pop();
            }

            if (newNotes.trim()) {
                filteredLines.push('');
                if (newNotes.includes('\n')) {
                    filteredLines.push('<' + '!-- Note:');
                    filteredLines.push(newNotes);
                    filteredLines.push('--' + '>');
                } else {
                    filteredLines.push('<' + '!-- Note: ' + newNotes + ' --' + '>');
                }
            }

            lines.splice(slide.startLineIdx, slide.lineCount, ...filteredLines);
            editor.value = lines.join('\n');
            renderSlides();
        }

        // Main Render Slides
        function renderSlides() {
            const markdown = document.getElementById('editor').value;
            slides = parseSlidesFromMarkdown(markdown);

            const container = document.getElementById('slides-container');
            const selectSlide = document.getElementById('select-slide');
            const outlineList = document.getElementById('outline-list');

            container.innerHTML = '';
            selectSlide.innerHTML = '';
            outlineList.innerHTML = '';

            if (slides.length === 0) {
                container.innerHTML = '<div class="slide active slide-cover"><h1>無投影片內容</h1><p>請在左側輸入 Markdown 內容</p></div>';
                return;
            }

            slides.forEach((slide, idx) => {
                // Parse markdown to HTML
                let parsedHTML = marked.parse(slide.displayContent);
                slide.htmlContent = parsedHTML;

                // Determine layout class
                const layoutClass = slide.isCover ? 'slide-cover' : 'slide-content';

                // Create slide element
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${layoutClass}`;
                slideDiv.id = `slide-${idx}`;
                slideDiv.innerHTML = `
                    <div class="slide-border absolute inset-4 rounded-xl pointer-events-none z-0"></div>
                    <div class="slide-body z-10 w-full">${parsedHTML}</div>
                `;

                container.appendChild(slideDiv);

                // Add to drop-down selector
                const opt = document.createElement('option');
                opt.value = idx;
                // Get slide title as label (first heading text)
                const titleMatch = slide.displayContent.match(/^(?:#{1,3})\s+(.*)$/m);
                const slideLabel = titleMatch ? titleMatch[1] : `投影片 ${idx + 1}`;
                opt.innerText = `${idx + 1}. ${slideLabel.replace(/\*|_|`/g, '')}`;
                selectSlide.appendChild(opt);

                // Add to Outline View
                const outlineDiv = document.createElement('div');
                outlineDiv.className = 'glass-card border border-slate-800/80 rounded-2xl p-6 hover:border-indigo-500/40 transition duration-300';

                const notesHtml = `
                    <div class="mt-4 pt-3 border-t border-slate-800/60">
                        <span class="text-xs font-bold text-amber-500 flex items-center gap-1.5 mb-1"><i class="fa-solid fa-receipt"></i> 講者備忘錄 (雙擊編輯)：</span>
                        <div class="outline-note-text bg-amber-500/5 border border-amber-500/15 hover:border-amber-500/35 rounded-xl p-3 text-xs text-amber-200/80 cursor-pointer transition select-text" data-slide-idx="${idx}" title="雙擊編輯講者備忘錄">
                            ${slide.notes ? slide.notes : '<span class="text-slate-500 italic">無備忘紀錄，雙擊此處新增...</span>'}
                        </div>
                    </div>
                `;

                outlineDiv.innerHTML = `
                    <div class="flex items-center justify-between border-b border-slate-800 pb-2.5 mb-3.5">
                        <span class="text-xs font-bold text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 px-2 py-0.5 rounded">投影片 ${idx + 1} / ${slides.length}</span>
                        ${slide.isCover ? '<span class="text-[10px] text-purple-400 font-semibold bg-purple-500/10 border border-purple-500/20 px-1.5 py-0.5 rounded">封面樣式</span>' : ''}
                    </div>
                    <div class="prose prose-invert max-w-none text-slate-300 text-sm mb-4">
                        ${parsedHTML}
                    </div>
                    ${notesHtml}
                `;
                outlineList.appendChild(outlineDiv);

                // Attach direct editing handlers for this slide
                attachEditEventsToSlide(idx);
            });

            // Bind double click edit for outline notes
            const outlineNotes = outlineList.querySelectorAll('.outline-note-text');
            outlineNotes.forEach(noteEl => {
                noteEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    startOutlineNoteEdit(noteEl);
                });
            });

            // Re-render math formulas via KaTeX
            renderMathInElement(container, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '\\[', right: '\\]', display: true }
                ],
                throwOnError: false
            });

            // Re-render math in outline
            renderMathInElement(outlineList, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false }
                ],
                throwOnError: false
            });

            // Synchronize active slide state
            if (currentSlideIdx >= slides.length) {
                currentSlideIdx = slides.length - 1;
            }
            if (currentSlideIdx < 0) currentSlideIdx = 0;

            showSlide(currentSlideIdx);
        }

        // Show specific slide index
        // Show specific slide index
        function showSlide(index) {
            const slideElements = document.querySelectorAll('.slide');
            if (slideElements.length === 0) return;

            // Remove classes
            slideElements.forEach((el, idx) => {
                el.classList.remove('active', 'prev');
                if (idx < index) {
                    el.classList.add('prev');
                }
            });

            // Set active
            const activeSlide = document.getElementById(`slide-${index}`);
            if (activeSlide) {
                activeSlide.classList.add('active');
            }

            currentSlideIdx = index;

            // Update selectors/HUD counters
            document.getElementById('select-slide').value = index;
            document.getElementById('slide-counter-val').innerText = `${index + 1} / ${slides.length}`;
            document.getElementById('fs-slide-counter').innerText = `${index + 1} / ${slides.length}`;

            // Update slide progress line
            const progressPct = ((index + 1) / slides.length) * 100;
            document.getElementById('slide-progress-line').style.width = `${progressPct}%`;

            // Update speaker notes content
            const notesContent = document.getElementById('notes-content');
            if (slides[index] && slides[index].notes) {
                notesContent.innerText = slides[index].notes;
                document.getElementById('btn-notes-toggle').classList.add('border-amber-500/50', 'bg-amber-500/10');
            } else {
                notesContent.innerText = '本頁無講者備忘錄';
                document.getElementById('btn-notes-toggle').classList.remove('border-amber-500/50', 'bg-amber-500/10');
            }

            // Reset autoplay progress for this slide if playing
            if (isPlaying) {
                resetAutoplayCountdown();
            }
        }

        // Next/Prev navigation
        function nextSlide() {
            if (currentSlideIdx < slides.length - 1) {
                showSlide(currentSlideIdx + 1);
            } else if (isPlaying) {
                // Loop back to start if playing
                showSlide(0);
            }
        }

        function prevSlide() {
            if (currentSlideIdx > 0) {
                showSlide(currentSlideIdx - 1);
            }
        }

        function jumpToSlide(index) {
            showSlide(index);
        }

        // Autoplay play/pause
        function togglePlay() {
            const btn = document.getElementById('btn-play');
            if (isPlaying) {
                stopAutoplay();
                btn.innerHTML = '<i class="fa-solid fa-play"></i>';
                btn.classList.replace('bg-rose-600', 'bg-indigo-600');
                btn.classList.replace('hover:bg-rose-500', 'hover:bg-indigo-500');
            } else {
                startAutoplay();
                btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                btn.classList.replace('bg-indigo-600', 'bg-rose-600');
                btn.classList.replace('hover:bg-indigo-500', 'hover:bg-rose-500');
            }
        }

        function startAutoplay() {
            isPlaying = true;
            resetAutoplayCountdown();

            playTimer = setInterval(() => {
                nextSlide();
            }, playIntervalSec * 1000);
        }

        function stopAutoplay() {
            isPlaying = false;
            clearInterval(playTimer);
            clearInterval(autoplayProgressTimer);
            document.getElementById('autoplay-progress').style.width = '0%';
        }

        function resetAutoplayCountdown() {
            clearInterval(autoplayProgressTimer);
            autoplayProgressPercent = 0;
            const progress = document.getElementById('autoplay-progress');

            const stepMs = 100;
            const totalSteps = (playIntervalSec * 1000) / stepMs;

            autoplayProgressTimer = setInterval(() => {
                autoplayProgressPercent += 100 / totalSteps;
                if (autoplayProgressPercent >= 100) {
                    autoplayProgressPercent = 100;
                    clearInterval(autoplayProgressTimer);
                }
                progress.style.width = `${autoplayProgressPercent}%`;
            }, stepMs);

            // Reset outer timer interval
            clearInterval(playTimer);
            playTimer = setInterval(() => {
                nextSlide();
            }, playIntervalSec * 1000);
        }

        function updateInterval() {
            const val = parseInt(document.getElementById('play-interval').value);
            if (val >= 2 && val <= 60) {
                playIntervalSec = val;
                if (isPlaying) {
                    resetAutoplayCountdown();
                }
            }
        }

        // Change Slide Transition Mode
        // Change Slide Transition Mode
        function changeTransition(mode) {
            const viewport = document.getElementById('slide-viewport');
            // Remove previous transitions
            viewport.classList.remove('transition-slide-h', 'transition-slide-v', 'transition-fade', 'transition-zoom');

            // Add new one
            viewport.classList.add(`transition-${mode}`);
        }

        // Change Aspect Ratio
        function changeRatio(ratio) {
            const viewport = document.getElementById('slide-viewport');
            if (ratio === '4-3') {
                viewport.classList.add('ratio-4-3');
            } else {
                viewport.classList.remove('ratio-4-3');
            }
        }

        // Set Slide Theme
        function setTheme(themeName, labelText) {
            const viewport = document.getElementById('slide-viewport');
            viewport.className = viewport.className.replace(/theme-\w+/g, '');
            viewport.classList.add(`theme-${themeName}`);
            document.getElementById('current-theme-label').innerText = labelText;
        }

        // Toggle Notes Drawer
        function toggleNotesDrawer() {
            const drawer = document.getElementById('notes-drawer');
            drawer.classList.toggle('hidden');
        }

        // Laser pointer implementation
        function toggleLaserPointer() {
            laserEnabled = !laserEnabled;
            const btn = document.getElementById('btn-laser');
            const fsBtn = document.getElementById('btn-fs-laser');
            const pointer = document.getElementById('laser-pointer');
            const viewport = document.getElementById('slide-viewport');

            if (laserEnabled) {
                btn.classList.add('bg-rose-500/20', 'border-rose-500/60', 'text-rose-100');
                if (fsBtn) fsBtn.classList.add('text-rose-500');
                pointer.style.display = 'block';
                viewport.classList.add('laser-cursor');

                viewport.addEventListener('mousemove', handleLaserMove);
                viewport.addEventListener('mouseleave', handleLaserLeave);
            } else {
                btn.classList.remove('bg-rose-500/20', 'border-rose-500/60', 'text-rose-100');
                if (fsBtn) fsBtn.classList.remove('text-rose-500');
                pointer.style.display = 'none';
                viewport.classList.remove('laser-cursor');

                viewport.removeEventListener('mousemove', handleLaserMove);
                viewport.removeEventListener('mouseleave', handleLaserLeave);
            }
        }

        function handleLaserMove(e) {
            const pointer = document.getElementById('laser-pointer');
            const rect = document.getElementById('slide-viewport').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            pointer.style.left = `${x}px`;
            pointer.style.top = `${y}px`;
        }

        function handleLaserLeave() {
            document.getElementById('laser-pointer').style.display = 'none';
        }

        // Fullscreen Controls
        function requestFullscreen() {
            const viewport = document.getElementById('slide-viewport');
            if (viewport.requestFullscreen) {
                viewport.requestFullscreen();
            } else if (viewport.webkitRequestFullscreen) { /* Safari */
                viewport.webkitRequestFullscreen();
            } else if (viewport.msRequestFullscreen) { /* IE11 */
                viewport.msRequestFullscreen();
            }
        }

        // Handle browser fullscreen change
        document.addEventListener('fullscreenchange', () => {
            const hud = document.getElementById('fullscreen-hud');
            if (document.fullscreenElement) {
                hud.classList.remove('opacity-0', 'pointer-events-none');
                hud.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                hud.classList.add('opacity-0', 'pointer-events-none');
                hud.classList.remove('opacity-100', 'pointer-events-auto');
                // Ensure default cursor returns if laser wasn't enabled
                if (!laserEnabled) {
                    document.getElementById('slide-viewport').style.cursor = 'default';
                }
            }
        });

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        // Switch Workspace view modes (Dual / Present / Outline)
        function switchViewMode(mode) {
            const editorPanel = document.getElementById('editor-container');
            const previewPanel = document.getElementById('preview-container');
            const outlinePanel = document.getElementById('outline-container');

            const btnDual = document.getElementById('view-dual');
            const btnPresent = document.getElementById('view-present');
            const btnOutline = document.getElementById('view-outline');

            // Reset buttons
            [btnDual, btnPresent, btnOutline].forEach(btn => {
                btn.className = "px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center space-x-1.5 text-slate-400 hover:text-white";
            });

            if (mode === 'dual') {
                editorPanel.classList.remove('hidden');
                previewPanel.classList.remove('hidden');
                outlinePanel.classList.add('hidden');
                btnDual.className = "px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center space-x-1.5 bg-indigo-600 text-white shadow";
            } else if (mode === 'present') {
                editorPanel.classList.add('hidden');
                previewPanel.classList.remove('hidden');
                outlinePanel.classList.add('hidden');
                btnPresent.className = "px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center space-x-1.5 bg-indigo-600 text-white shadow";
            } else if (mode === 'outline') {
                editorPanel.classList.add('hidden');
                previewPanel.classList.add('hidden');
                outlinePanel.classList.remove('hidden');
                btnOutline.className = "px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center space-x-1.5 bg-indigo-600 text-white shadow";
            }
        }

        // Insert functions for Editor
        function insertSlideBreak() {
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            editor.value = text.substring(0, start) + "\n\n---\n\n## 投影片標題\n- 項目一\n- 項目二" + text.substring(end);
            editor.focus();
            renderSlides();
        }

        function insertMath() {
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            editor.value = text.substring(0, start) + "$$ \\text{公式} $$" + text.substring(end);
            editor.focus();
            renderSlides();
        }

        function insertNote() {
            const editor = document.getElementById('editor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            editor.value = text.substring(0, start) + "\n\n<!-- Note: 講者提示備忘內容 -->" + text.substring(end);
            editor.focus();
            renderSlides();
        }

        // Export/Download modified markdown
        function exportMarkdown() {
            const text = document.getElementById('editor').value;
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '簡報大綱_匯出.md';
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Import files
        function importFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                document.getElementById('editor').value = evt.target.result;
                renderSlides();
            };
            reader.readAsText(file);
        }

        // Event listener for editor inputs
        let renderTimeout;
        document.getElementById('editor').addEventListener('input', () => {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(renderSlides, 300);
        });

        // Key listeners for presentations
        document.addEventListener('keydown', (e) => {
            // Only trigger if not typing in text area, input, or an editable slide element
            if (document.activeElement.tagName === 'TEXTAREA' ||
                document.activeElement.tagName === 'INPUT' ||
                document.activeElement.isContentEditable) {
                return;
            }

            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                requestFullscreen();
            } else if (e.key === 'Escape') {
                exitFullscreen();
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            renderSlides();
        });
    </script>
</body>
